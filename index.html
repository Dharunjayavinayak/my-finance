<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dharun Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{
  font-family:'Manrope',sans-serif;
  background:#f0f0f8;
  min-height:100dvh;
  color:#1e1b3a;
}

/* ── PIN OVERLAY ── */
#pin-overlay{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(145deg,#e8e8f8 0%,#f0ecff 100%);
  display:flex;align-items:center;justify-content:center;
}
#pin-overlay.hidden{display:none}
.pin-box{
  background:#fff;border-radius:28px;padding:40px 36px;
  box-shadow:0 24px 64px rgba(80,60,180,0.14);
  max-width:360px;width:90%;text-align:center;
}
.pin-logo{
  width:58px;height:58px;border-radius:18px;
  background:linear-gradient(135deg,#7c6ef5,#5b4fd4);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:18px;
}
.pin-logo svg{width:28px;height:28px;color:#fff;stroke:#fff}
.pin-box h2{font-size:20px;font-weight:800;color:#1e1b3a;margin-bottom:6px}
.pin-box p{font-size:13px;color:#8882aa;margin-bottom:28px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:28px}
.pin-dot{
  width:18px;height:18px;border-radius:999px;
  border:2px solid #c9c4e8;background:transparent;
  transition:.2s;
}
.pin-dot.filled{background:#7c6ef5;border-color:#7c6ef5}
.pin-dot.error{background:#ef4444;border-color:#ef4444}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pin-key{
  border:none;background:#f4f2ff;border-radius:16px;
  padding:17px;font-size:18px;font-weight:800;color:#1e1b3a;
  cursor:pointer;transition:.15s;
}
.pin-key:hover{background:#ebe7ff}
.pin-key:active{transform:scale(.94)}
.pin-key.del{background:#fff0f0;color:#ef4444}
.pin-key.del:hover{background:#ffe4e4}
.pin-error{
  font-size:13px;color:#ef4444;font-weight:700;
  min-height:18px;margin-top:10px;
}

/* ── MAIN APP ── */
#app{display:none}
#app.visible{display:block}
.page{
  max-width:430px;margin:0 auto;
  padding:0 0 100px 0;
  min-height:100dvh;
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 20px 8px;
}
.topbar h1{font-size:26px;font-weight:800;color:#1e1b3a;letter-spacing:-.02em}
.fab{
  width:50px;height:50px;border-radius:18px;
  background:linear-gradient(135deg,#7c6ef5,#5b4fd4);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(92,75,212,.35);
  transition:.15s;position:relative;
}
.fab:hover{transform:scale(1.07)}
.fab svg{width:24px;height:24px;stroke:#fff;stroke-width:2.5;fill:none}

/* FAB menu */
.fab-menu{
  position:absolute;top:calc(100% + 10px);right:0;
  background:#fff;border-radius:18px;padding:8px;
  box-shadow:0 12px 40px rgba(80,60,180,0.18);
  min-width:200px;
  display:none;z-index:50;
}
.fab-menu.open{display:block}
.fab-menu a{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;border-radius:12px;text-decoration:none;
  font-size:14px;font-weight:700;color:#1e1b3a;
}
.fab-menu a:hover{background:#f4f2ff}
.fab-menu a .ficon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}

/* ── SECTION CARD ── */
.section-card{
  background:#fff;border-radius:24px;
  margin:10px 14px;
  box-shadow:0 4px 20px rgba(80,60,180,0.07);
  overflow:hidden;
}
.card-header{
  display:flex;align-items:center;gap:14px;
  padding:18px 18px 14px;
}
.card-icon{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.card-icon svg{width:22px;height:22px;stroke-width:2;fill:none}
.card-header-text h2{font-size:16px;font-weight:800;color:#1e1b3a;margin:0}
.card-header-text p{font-size:12px;color:#8882aa;margin:2px 0 0}

/* ── INVEST CARD ── */
.invest-icon{background:#ede9ff}
.invest-icon svg{stroke:#7c6ef5}
.invest-donut-wrap{padding:0 18px 16px;display:flex;align-items:center;gap:24px}
.donut-chart-box{position:relative;width:160px;height:160px;flex-shrink:0}
.donut-chart-box canvas{width:160px!important;height:160px!important}
.donut-center{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
}
.donut-label{font-size:11px;color:#8882aa;font-weight:600}
.donut-value{font-size:17px;font-weight:800;color:#1e1b3a;line-height:1.2}
.donut-delta{font-size:12px;font-weight:700;color:#22c55e}
.invest-legend{flex:1;display:flex;flex-direction:column;gap:10px}
.legend-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.legend-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#1e1b3a}
.legend-dot{width:12px;height:12px;border-radius:999px;flex-shrink:0}
.legend-pct{font-size:14px;font-weight:700;color:#8882aa}

.invest-open{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:16px;margin:0 14px 0;
  background:#f4f2ff;border-radius:14px;
  font-size:14px;font-weight:800;color:#7c6ef5;
  text-decoration:none;cursor:pointer;border:none;width:calc(100% - 28px);
  transition:.15s;
}
.invest-open:hover{background:#ede9ff}
.invest-open svg{width:16px;height:16px;stroke:#7c6ef5;fill:none;stroke-width:2.5}
.invest-card-bottom{padding-bottom:6px}

/* ── EXPENSE CARD ── */
.expense-icon{background:#e6faf2}
.expense-icon svg{stroke:#16a34a}
.bank-list{display:flex;flex-direction:column}
.bank-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 18px;border-bottom:1px solid #f3f4f8;
  cursor:pointer;text-decoration:none;color:inherit;
}
.bank-row:last-child{border-bottom:none}
.bank-row:hover{background:#f9fafb}
.bank-left{display:flex;align-items:center;gap:14px}
.bank-logo{
  width:44px;height:44px;border-radius:14px;overflow:hidden;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:16px;
}
.bank-info h3{font-size:14px;font-weight:800;color:#1e1b3a;margin:0}
.bank-info p{font-size:12px;color:#8882aa;margin:2px 0 0}
.bank-right{text-align:right;flex-shrink:0}
.bank-amount{font-size:15px;font-weight:800;color:#1e1b3a}
.bank-label{font-size:11px;color:#22c55e;font-weight:600;margin-top:2px}
.bank-arrow{color:#c9c4e8;font-size:16px}

.expense-open{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:16px;margin:10px 14px 0;
  background:#e6faf2;border-radius:14px;
  font-size:14px;font-weight:800;color:#16a34a;
  text-decoration:none;cursor:pointer;border:none;width:calc(100% - 28px);
  transition:.15s;
}
.expense-open:hover{background:#d1fae5}
.expense-open svg{width:16px;height:16px;stroke:#16a34a;fill:none;stroke-width:2.5}
.expense-card-bottom{padding-bottom:6px}

/* sync status */
.sync-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 20px 4px;font-size:12px;color:#8882aa;font-weight:600;
}
.sync-dot{width:8px;height:8px;border-radius:999px;background:#8882aa;flex-shrink:0}
.sync-dot.ok{background:#22c55e}
.sync-dot.err{background:#ef4444}
</style>
</head>

  <script>
// ════════════════════════════════
//  PIN LOGIC  (set your real PIN here)
// ════════════════════════════════
const CORRECT_PIN = "2580"; // ← change this to your desired PIN
let entered = "";

function pinKey(k) {
  if (entered.length >= 4) return;
  entered += k;
  updateDots();
  if (entered.length === 4) {
    setTimeout(checkPin, 120);
  }
}
function pinDel() {
  if (!entered.length) return;
  entered = entered.slice(0,-1);
  updateDots();
  document.getElementById("pinError").textContent = "";
  document.querySelectorAll(".pin-dot").forEach(d => d.classList.remove("error"));
}
function updateDots() {
  for (let i=0;i<4;i++) {
    const d = document.getElementById("d"+i);
    d.classList.toggle("filled", i < entered.length);
    d.classList.remove("error");
  }
}
function checkPin() {
  if (entered === CORRECT_PIN) {
    document.getElementById("pin-overlay").classList.add("hidden");
    document.getElementById("app").classList.add("visible");
    initDashboard();
  } else {
    document.querySelectorAll(".pin-dot").forEach(d => d.classList.add("error"));
    document.getElementById("pinError").textContent = "Incorrect PIN. Try again.";
    setTimeout(() => {
      entered = "";
      updateDots();
      document.getElementById("pinError").textContent = "";
    }, 900);
  }
}
// keyboard support
document.addEventListener("keydown", e => {
  if (document.getElementById("pin-overlay").classList.contains("hidden")) return;
  if (/^[0-9]$/.test(e.key)) pinKey(e.key);
  if (e.key === "Backspace") pinDel();
});

// ════════════════════════════════
//  FAB MENU
// ════════════════════════════════
function toggleFab() {
  document.getElementById("fabMenu").classList.toggle("open");
}
function closeFab() {
  document.getElementById("fabMenu").classList.remove("open");
}
document.addEventListener("click", e => {
  if (!document.getElementById("fabBtn").contains(e.target)) closeFab();
});

// ════════════════════════════════
//  HELPERS
// ════════════════════════════════
function money(n) {
  const num = parseFloat(n) || 0;
  return "₹" + num.toLocaleString("en-IN", {maximumFractionDigits:2});
}
function moneyShort(n) {
  const num = parseFloat(n) || 0;
  if (num >= 100000) return "₹" + (num/100000).toLocaleString("en-IN",{maximumFractionDigits:2})+" L";
  if (num >= 1000) return "₹" + (num/1000).toLocaleString("en-IN",{maximumFractionDigits:1})+"K";
  return money(num);
}
function setSyncStatus(type, msg) {
  const dot = document.getElementById("syncDot");
  dot.className = "sync-dot" + (type==="ok"?" ok":type==="err"?" err":"");
  document.getElementById("syncMsg").textContent = msg;
}

// ════════════════════════════════
//  INVESTMENT DONUT
// ════════════════════════════════
let investChart = null;
const INV_COLORS = ["#7c6ef5","#60a5fa","#34d399","#fbbf24"];

function renderInvestCard(data) {
  // data = { stocks, mf, gs, total }
  const { stocks=0, mf=0, gs=0, total=1 } = data;
  const segments = [
    { label:"Equity Funds", value:stocks, pct: Math.round(stocks/total*100) },
    { label:"Index Funds",  value:mf,     pct: Math.round(mf/total*100) },
    { label:"PPF",          value:0,      pct: 0 },
    { label:"Gold",         value:gs,     pct: Math.round(gs/total*100) },
  ];
  // recalculate PPF as remainder
  const usedPct = segments[0].pct + segments[1].pct + segments[3].pct;
  segments[2].pct = Math.max(0, 100 - usedPct);
  segments[2].value = Math.max(0, total - stocks - mf - gs);

  document.getElementById("investTotal").textContent = moneyShort(total);
  // growth: dummy ~12.6% based on 66% in zerodha
  const growth = total > 0 ? "+12.6% ↗" : "0%";
  document.getElementById("investGrowth").textContent = growth;

  // Legend
  document.getElementById("investLegend").innerHTML = segments.map((s,i)=>`
    <div class="legend-row">
      <div class="legend-left">
        <div class="legend-dot" style="background:${INV_COLORS[i]}"></div>
        ${s.label}
      </div>
      <div class="legend-pct">${s.pct}%</div>
    </div>
  `).join("");

  // Chart
  const ctx = document.getElementById("investDonut");
  if (investChart) investChart.destroy();
  investChart = new Chart(ctx, {
    type:"doughnut",
    data:{
      labels: segments.map(s=>s.label),
      datasets:[{
        data: segments.map(s=>s.value),
        backgroundColor: INV_COLORS,
        borderColor:"#fff",
        borderWidth:4,
        hoverOffset:6,
      }]
    },
    options:{
      responsive:false, cutout:"72%",
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+": "+moneyShort(ctx.raw)}}}
    }
  });
}

// ════════════════════════════════
//  EXPENSE BANK LIST
// ════════════════════════════════
const BANK_META = {
  "Hdfc":{name:"HDFC Bank",acc:"**** 0001",bg:"linear-gradient(135deg,#004C8F,#006EC7)",fg:"#fff",abbr:"H"},
  "Iob": {name:"Indian Overseas Bank",acc:"**** 0002",bg:"linear-gradient(135deg,#1a4fa0,#2563eb)",fg:"#fff",abbr:"I"},
  "Canara":{name:"Canara Bank",acc:"**** 0003",bg:"linear-gradient(135deg,#036d19,#16a34a)",fg:"#fff",abbr:"C"},
  "Sbi": {name:"State Bank of India",acc:"**** 1234",bg:"linear-gradient(135deg,#1b4fa0,#2176c7)",fg:"#fff",abbr:"S"},
  "Axis":{name:"Axis Bank",acc:"**** 5678",bg:"linear-gradient(135deg,#97040d,#d11a2a)",fg:"#fff",abbr:"A"},
  "Icici":{name:"ICICI Bank",acc:"**** 9101",bg:"linear-gradient(135deg,#cc5500,#e87722)",fg:"#fff",abbr:"i"},
};

function renderExpenseCard(banksData) {
  // banksData = [{bank, balance}]
  const list = document.getElementById("bankList");
  if (!banksData.length) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:#8882aa;font-size:13px">No expense data synced yet</div>`;
    return;
  }
  list.innerHTML = banksData.map(b => {
    const meta = BANK_META[b.bank] || {name:b.bank,acc:"****",bg:"#eee",fg:"#333",abbr:b.bank[0]};
    return `
    <a class="bank-row" href="expense_tracker.html">
      <div class="bank-left">
        <div class="bank-logo" style="background:${meta.bg};color:${meta.fg}">${meta.abbr}</div>
        <div class="bank-info">
          <h3>${meta.name}</h3>
          <p>${meta.acc}</p>
        </div>
      </div>
      <div class="bank-right">
        <div class="bank-amount">${money(b.balance)}</div>
        <div class="bank-label">Available Balance</div>
      </div>
      <span class="bank-arrow">›</span>
    </a>`;
  }).join("");
}

// ════════════════════════════════
//  DATA FETCHING
// ════════════════════════════════
async function fetchInvestData() {
  let scriptUrl = "";
  try { scriptUrl = localStorage.getItem("pt_script_url") || ""; } catch(e){}
  if (!scriptUrl) return null;
  try {
    const res = await fetch(scriptUrl + "?action=read&t=" + Date.now());
    const text = await res.text();
    const json = JSON.parse(text);
    let stocks=0, mf=0, gs=0;
    ["Stocks","SIP","GoldSilver"].forEach(sheet => {
      const rows = json[sheet];
      if (Array.isArray(rows) && rows.length > 1) {
        const headers = rows[0].map(h=>String(h).trim());
        const amtIdx = headers.findIndex(h=>h==="Amount"||h==="amount");
        rows.slice(1).forEach(row => {
          const amt = parseFloat(row[amtIdx]) || 0;
          if (sheet==="Stocks") stocks += amt;
          else if (sheet==="SIP") mf += amt;
          else gs += amt;
        });
      }
    });
    return { stocks, mf, gs, total: stocks+mf+gs };
  } catch(e) { return null; }
}

async function fetchExpenseData() {
  let scriptUrl = "";
  try { scriptUrl = localStorage.getItem("dharun_finances_script_url") || ""; } catch(e){}
  if (!scriptUrl) return null;
  try {
    const sep = scriptUrl.includes("?") ? "&" : "?";
    const res = await fetch(scriptUrl + sep + "action=read&t=" + Date.now());
    const json = await res.json();
    if (!Array.isArray(json.transactions)) return null;
    const txs = json.transactions;
    const banks = json.banks || [...new Set(txs.map(t=>t.bank).filter(Boolean))];
    const banksData = banks.map(bank => {
      const bankTxs = txs.filter(t=>t.bank===bank).sort((a,b)=>b.date.localeCompare(a.date));
      const latest = bankTxs[0];
      const balance = latest ? (parseFloat(latest.balance) || 0) : 0;
      return { bank, balance };
    });
    return banksData;
  } catch(e) { return null; }
}

// ════════════════════════════════
//  INIT DASHBOARD
// ════════════════════════════════
async function initDashboard() {
  setSyncStatus("", "Syncing data…");

  // Check if script URLs are saved
  let invUrl="", expUrl="";
  try { invUrl = localStorage.getItem("pt_script_url") || ""; } catch(e){}
  try { expUrl = localStorage.getItem("dharun_finances_script_url") || ""; } catch(e){}

  let invOk = false, expOk = false;

  // Investment
  if (invUrl) {
    const invData = await fetchInvestData();
    if (invData) {
      renderInvestCard(invData);
      invOk = true;
    } else {
      renderInvestCard({stocks:0,mf:0,gs:0,total:0});
    }
  } else {
    // No URL saved — show placeholder donut
    renderInvestCard({stocks:45,mf:25,gs:10,total:80});
  }

  // Expense
  if (expUrl) {
    const expData = await fetchExpenseData();
    if (expData && expData.length) {
      renderExpenseCard(expData);
      expOk = true;
    } else {
      renderExpenseCard([]);
    }
  } else {
    // No URL saved — show placeholder banks
    renderExpenseCard([
      {bank:"Sbi", balance:125430.50},
      {bank:"Axis", balance:78920.20},
      {bank:"Icici", balance:45670.80},
    ]);
  }

  if (!invUrl && !expUrl) {
    setSyncStatus("err", "Open each tracker and set the Apps Script URL to sync live data.");
  } else if (invOk || expOk) {
    setSyncStatus("ok", "Synced · " + new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}));
  } else {
    setSyncStatus("err", "Could not sync — check your script URL in each tracker.");
  }
}
